schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: product_requirements_domain
title: Product and Requirements Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Translate user/business intent into requirements, user stories, acceptance
  criteria, roadmaps, and design constraints.
burden: Prevent engineering agents from implementing undefined product intent.
primary_questions:
- Who needs this and why?
- What counts as done?
- What tradeoffs or non-goals are explicit?
specialist_agents:
- PRODUCT_ANALYST
- REQUIREMENTS_TRANSLATOR
- USER_STORY_SCRIBE
- SCOPE_NEMESIS
state_families:
- requirement_state
- user_story_state
- acceptance_state
- non_goal_state
template_families:
- requirements_packet
- user_story_packet
- scope_boundary_packet
protocols:
- intent_to_requirement
- non_goals_are_context
- acceptance_before_build
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
