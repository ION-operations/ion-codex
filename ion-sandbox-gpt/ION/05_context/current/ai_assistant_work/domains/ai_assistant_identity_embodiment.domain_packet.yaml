schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: ai_assistant_identity_embodiment
title: AI Assistant Identity and Embodiment Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Define what an AI assistant is across chat, IDE, CLI, cloud, PR, and background
  agent bodies.
burden: Prevent assistant identity from collapsing into model, prompt, autocomplete,
  chatbot, or unbounded autonomous worker.
primary_questions:
- What is an AI assistant in this host body?
- What can it see, touch, remember, prove, and hand off?
- Where does chat end and workspace action begin?
specialist_agents:
- ASSISTANT_ONTOLOGIST
- EMBODIMENT_CARTOGRAPHER
- CAPABILITY_BOUNDARY_AUDITOR
state_families:
- assistant_session_state
- host_capability_profile
- authority_boundary_state
- tool_surface_state
template_families:
- assistant_embodiment_mount
- capability_boundary_report
- host_tool_surface_inventory
protocols:
- assistant_is_work_interface_not_model_alone
- host_body_capability_mapping
- chat_ide_cli_cloud_boundary_mapping
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
