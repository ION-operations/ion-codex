schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: workflow_automation_tool_domain
title: Workflow Automation and Tool Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Own tool calls, scripts, MCP/gateway actions, agent skills, IDE commands,
  and automation boundaries.
burden: Prevent tool availability from being confused with authority to act.
primary_questions:
- What tool action is being requested?
- What approval and proof does it require?
- What receipt should future work inherit?
specialist_agents:
- TOOL_STEWARD
- AUTOMATION_MASON
- GATEWAY_AUDITOR
- SKILL_PACKAGER
state_families:
- tool_surface_state
- automation_plan_state
- approval_state
- tool_receipt_state
template_families:
- tool_action_packet
- automation_script_packet
- approval_request_packet
- tool_receipt
protocols:
- tool_access_is_not_authority
- approval_before_side_effect
- receipt_after_tool_action
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
