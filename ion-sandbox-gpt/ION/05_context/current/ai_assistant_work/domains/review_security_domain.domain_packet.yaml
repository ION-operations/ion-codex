schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: review_security_domain
title: Review, Safety, and Security Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Own code review, security review, prompt/tool injection risk, data exposure,
  and adversarial checks.
burden: Make autonomous or semi-autonomous assistant work secure-by-design rather
  than merely convenient.
primary_questions:
- What can this assistant be tricked into doing?
- What secrets or dangerous tools are in scope?
- Which changes require escalation?
specialist_agents:
- CODE_REVIEWER
- SECURITY_NEMESIS
- PROMPT_INJECTION_AUDITOR
- SECRET_BOUNDARY_AUDITOR
- POLICY_STEWARD
state_families:
- review_state
- security_risk_state
- secret_exposure_state
- prompt_injection_surface_state
template_families:
- code_review_packet
- security_review_packet
- prompt_injection_audit_packet
- risk_escalation_packet
protocols:
- adversarial_review_before_landing
- secret_boundary_preservation
- tool_injection_guard
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
