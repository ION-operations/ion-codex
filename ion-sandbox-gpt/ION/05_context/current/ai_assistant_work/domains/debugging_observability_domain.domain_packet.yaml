schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: debugging_observability_domain
title: Debugging and Observability Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Own runtime symptoms, logs, traces, reproduction, hypotheses, and fix verification.
burden: Prevent assistants from patching symptoms without establishing a reproducible
  failure mechanism.
primary_questions:
- What is the observed failure?
- Can it be reproduced?
- Which evidence supports the diagnosis?
specialist_agents:
- DEBUGGER
- LOG_ANALYST
- REPRODUCTION_BUILDER
- OBSERVABILITY_CARTOGRAPHER
state_families:
- symptom_state
- reproduction_state
- hypothesis_state
- trace_state
template_families:
- bug_repro_packet
- diagnosis_packet
- fix_verification_packet
protocols:
- repro_before_fix_when_possible
- hypothesis_evidence_split
- logs_are_evidence_not_truth
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
