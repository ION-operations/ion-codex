schema: ion.ai_assistant_work.template_spec.v0_1
template_id: background_queue_result_intake_packet
title: Background Queue Result Intake Packet
status: candidate_machine_checkable_template_spec_not_accepted_canon
created_at: '2026-05-08T15:19:39Z'
authority_boundary:
  candidate_only: true
  allowed_path: ION/05_context/current/ai_assistant_work/
  mutates_ION_03_registry: false
  mutates_product_front_door: false
  external_execution_authority: false
  requires_explicit_acceptance_to_land: true
owned_by_domain: background_queue_intake_domain
primary_agent: BACKGROUND_QUEUE_STEWARD
supporting_agents:
- RESULT_INTAKE_AUDITOR
- CLOUD_BRANCH_STEWARD
- SETTLEMENT_STEWARD
- RECEIPT_CURATOR
purpose: Create bounded queue packets and intake background results without claiming
  asynchronous execution unless receipts prove it.
intent_class: specialist_domain_template
state_inputs:
- queue_state
- authority_packet_state
- branch_return_state
- proof_state
state_outputs:
- normalized_branch_return_state
- intake_decision_state
- settlement_packet_state
required_context:
- operator objective
- authority ceiling
- allowed paths/tools
- expected return family
- approval evidence if required
machine_required_sections:
- name: QUEUE_PACKET
  type: object
  required_keys:
  - objective
  - authority
  - target
  - expected_return
- name: AUTHORITY_BOUNDARY
  type: object
  required_keys:
  - requires_approval
  - allowed_paths
  - forbidden_paths
- name: BRANCH_RETURN
  type: object
  required_keys:
  - result
  - files_touched
  - proof
- name: PROOF_NORMALIZATION
  type: list
  min_items: 1
- name: CONFLICTS_OR_GAPS
  type: list
  min_items: 0
- name: INTAKE_DECISION
  type: enum
  allowed:
  - accept_for_settlement
  - request_revision
  - reject
  - defer
- name: NON_CLAIMS
  type: list
  min_items: 1
- name: SETTLEMENT_ROUTE
  type: string
  min_length: 5
proof_gates:
- gate_id: candidate_boundary_named
  description: Output states it is candidate/not accepted unless explicit acceptance
    exists
  machine_check:
    requires_non_claim: accepted_state
- gate_id: required_sections_present
  description: Every machine_required_sections item is present and non-empty according
    to rule
  machine_check:
    type: schema_section_presence
- gate_id: settlement_route_named
  description: Return includes route for review/settlement/inheritance
  machine_check:
    section_any:
    - SETTLEMENT_ROUTE
    - RECEIPT_TARGET
- gate_id: proof_or_missing_context_named
  description: Proof, command receipts, or missing context are stated
  machine_check:
    requires_any:
    - PROOF
    - COMMAND_RECEIPTS
    - TEST_AND_PROOF_PLAN
    - PROOF_NORMALIZATION
    - CI_EVIDENCE
- gate_id: draft_gate_1
  description: approval evidence checked when required
  machine_check:
    type: human_or_script_check
- gate_id: draft_gate_2
  description: result has receipt or remains untrusted proposal
  machine_check:
    type: human_or_script_check
- gate_id: draft_gate_3
  description: no background claim without return proof
  machine_check:
    type: human_or_script_check
reject_if:
- background execution is claimed without receipt
- branch return widens scope without authority
- proof is missing but result is marked accepted
output_contract: queue packet or result-intake report
completion_class: branch_return_intake_ready_for_settlement
settlement_route: RESULT_INTAKE_AUDITOR then SETTLEMENT_STEWARD
route_binding:
  dispatch_before_generic_implementation: true
  trigger_patterns:
  - background queue result intake packet
  - background queue result intake
  - background queue steward
  fallback_agent_forbidden_until_specialist_check: true
minimal_valid_instance_shape:
  template_id: background_queue_result_intake_packet
  sections: must match machine_required_sections
  non_claims_required: true
  settlement_route_or_receipt_target_required: true
status_notes:
- This spec is machine-checkable structure for candidate current-context use; it is
  not active template law.
