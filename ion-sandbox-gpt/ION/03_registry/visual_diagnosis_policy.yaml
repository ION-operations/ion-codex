policy_id: ion.visual_diagnosis_policy.v1
version: V45_VISUAL_DIAGNOSIS_RECEIPTS_AND_BROWSER_HARNESS_PLAN
authority_scope: OBSERVE_DIAGNOSE_REPORT_PLAN_ONLY
allowed_modes:
  - OBSERVE
  - DIAGNOSE
  - COMPARE
  - EXPLAIN
  - PATCH_REQUEST
  - VERIFY
allowed_capture_surfaces:
  - screenshot
  - dom_snapshot
  - viewport_metadata
  - accessibility_tree
  - console_log_summary
  - before_after_pair
forbidden_actions:
  unrestricted_browser_control: false
  credential_sensitive_action: false
  destructive_action: false
  purchase_or_submission: false
  persistent_dom_mutation_without_authority: false
  production_authority: false
review_rules:
  high_or_critical_recommendations_require_human_review: true
  account_sensitive_targets_require_steward_review: true
  local_dev_capture_is_preferred_initial_scope: true
next: V46_LOCAL_VISUAL_HARNESS_PROTOTYPE
