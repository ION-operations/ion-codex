schema_id: ion.chatops_local_daemon_policy.v1
status: draft_non_production
production_authority: false
live_execution_authority: false
listen_host: 127.0.0.1
listen_port: 8767
approval_token: ION_CHATOPS_APPROVED
storage:
  actions: ION/05_context/current/chatops_bridge/actions/
  receipts: ION/05_context/current/chatops_bridge/receipts/
  runtime: ION/05_context/current/chatops_bridge/runtime/
  artifacts: ION/05_context/current/chatops_bridge/artifacts/
  sandbox_returns: ION/05_context/inbox/chatgpt_sandbox_returns/
  sandbox_return_receipts: ION/05_context/current/chatgpt_sandbox_returns/receipts/
supported_mvp_intents:
  - register_artifact
  - write_file_draft
  - create_codex_work_packet
  - create_github_issue_draft
allowed_write_prefixes:
  - ION/02_architecture/
  - ION/03_registry/
  - ION/05_context/current/chatops_bridge/
  - ION/05_context/inbox/
sandbox_return_surface:
  owner: ION/04_packages/kernel/ion_chatgpt_sandbox_return_intake.py
  protocol: ION/02_architecture/ION_CHATGPT_SANDBOX_RETURN_INTAKE_PROTOCOL.md
  schema: ION/03_registry/ion_chatgpt_sandbox_return.schema.json
  queue: ION/05_context/current/ACTIVE_CHATGPT_SANDBOX_RETURN_QUEUE.json
  inbox_root: ION/05_context/inbox/chatgpt_sandbox_returns/
  direct_apply_authority: false
  git_push_authority: false
  approval_required_for_write_endpoints: true
protected_path_tokens:
  - /.git/
  - .env
  - secret
  - token
  - credential
  - vault
main_policy:
  main_auto_push_allowed: false
  scoped_branch_push_allowed: policy_gated_later
  allowed_branch_prefixes:
    - work/
    - docs/
    - agent/
    - data-plane/
    - sev/
hard_gated_intents:
  - delete_file
  - overwrite_protected_file
  - push_main
  - access_credential
  - production_deploy
  - broad_shell
