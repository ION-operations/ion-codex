schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: testing_quality_domain
title: Testing and Quality Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Own test design, test execution, regression checks, validation plans, and
  quality evidence.
burden: Keep validation independent from implementation optimism.
primary_questions:
- What could break?
- Which tests prove the change?
- What validation was actually run?
specialist_agents:
- TEST_ARCHITECT
- TEST_RUNNER
- REGRESSION_HUNTER
- QUALITY_STEWARD
state_families:
- test_plan_state
- test_result_state
- regression_risk_state
- quality_gate_state
template_families:
- test_plan_packet
- validation_run_packet
- regression_matrix
- quality_receipt
protocols:
- proof_is_run_not_assumption
- focused_then_broad_validation
- failure_classification_loop
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
