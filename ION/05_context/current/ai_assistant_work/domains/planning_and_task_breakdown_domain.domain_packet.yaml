schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: planning_and_task_breakdown_domain
title: Planning and Task Breakdown Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Translate user intent into bounded tasks, packets, dependencies, acceptance
  criteria, and route decisions.
burden: Prevent vague prompts from becoming broad ungoverned work.
primary_questions:
- What is the bounded next step?
- Which specialist domain owns each subtask?
- What acceptance criteria and proof gates apply?
specialist_agents:
- TASK_PLANNER
- DEPENDENCY_ROUTER
- ACCEPTANCE_CRITERIA_STEWARD
- HORIZON_PLANNER
state_families:
- task_graph_state
- dependency_state
- acceptance_criteria_state
- horizon_state
template_families:
- workpacket_draft
- task_decomposition_packet
- acceptance_criteria_packet
protocols:
- bounded_next_step
- dependency_before_parallelism
- acceptance_before_execution
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
