schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: devops_release_domain
title: DevOps, CI/CD, and Release Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Own build, CI, deployment, environments, release notes, rollout, rollback,
  and operational readiness.
burden: Prevent IDE-local success from being mistaken for release readiness.
primary_questions:
- What environment is affected?
- What pipeline or release gate must pass?
- What rollback or receipt exists?
specialist_agents:
- BUILD_STEWARD
- CI_DIAGNOSTICIAN
- RELEASE_MANAGER
- ROLLBACK_PLANNER
state_families:
- build_state
- ci_state
- release_candidate_state
- deployment_risk_state
template_families:
- build_validation_packet
- ci_failure_packet
- release_readiness_packet
- rollback_packet
protocols:
- local_success_is_not_release
- environment_boundary
- rollback_before_rollout
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
