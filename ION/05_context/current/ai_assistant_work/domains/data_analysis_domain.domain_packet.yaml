schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: data_analysis_domain
title: Data and Analysis Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Own datasets, schemas, notebooks, analysis claims, visualization, and statistical/measurement
  proof.
burden: Prevent analysis outputs from becoming claims without source, method, and
  reproducibility.
primary_questions:
- What data is used and under what authority?
- What transformation or method produced the result?
- Can the result be reproduced?
specialist_agents:
- DATA_CARTOGRAPHER
- ANALYSIS_MASON
- VISUALIZATION_BUILDER
- METHOD_NEMESIS
state_families:
- dataset_state
- schema_state
- analysis_method_state
- claim_evidence_state
template_families:
- data_source_manifest
- analysis_packet
- visualization_packet
- claim_validation_packet
protocols:
- source_data_lineage
- method_before_claim
- reproducible_analysis
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
