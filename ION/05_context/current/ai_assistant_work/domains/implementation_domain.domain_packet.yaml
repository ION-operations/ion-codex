schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: implementation_domain
title: Implementation Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Produce bounded code changes under local conventions, diffs, tests, and proof.
burden: Stop implementation agents from absorbing planning, UI, docs, QA, release,
  and security into one overloaded role.
primary_questions:
- What precise files may be changed?
- What implementation pattern is allowed?
- What validation proves the patch?
specialist_agents:
- PATCH_MASON
- REFACTOR_MASON
- BUGFIX_MASON
- MIGRATION_MASON
state_families:
- patch_state
- diff_state
- allowed_write_scope_state
- validation_state
template_families:
- implementation_packet
- bounded_patch_packet
- refactor_packet
- migration_packet
protocols:
- allowed_write_scope
- diff_first_review
- test_after_mutation
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
