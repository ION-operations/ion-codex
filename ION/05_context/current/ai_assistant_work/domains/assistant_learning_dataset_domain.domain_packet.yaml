schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: assistant_learning_dataset_domain
title: Assistant Work Dataset and Taxonomy Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Build the massive dataset of AI-assisted work states, intents, protocols,
  templates, agent roles, failures, and receipts.
burden: Turn scattered AI-assistant usage into a reusable taxonomy and training/evaluation
  substrate.
primary_questions:
- What work patterns are people actually doing with AI assistants?
- What state objects recur across chat and IDE work?
- Which failures need templates, specialist agents, or gates?
specialist_agents:
- WORK_PATTERN_ETHNOGRAPHER
- STATE_TAXONOMIST
- TEMPLATE_MINER
- FAILURE_CLASSIFIER
- EVAL_DATASET_CURATOR
state_families:
- usage_pattern_state
- intent_taxonomy_state
- failure_mode_state
- template_gap_state
- agent_gap_state
template_families:
- work_observation_packet
- state_taxonomy_packet
- failure_classification_packet
- template_gap_packet
protocols:
- observe_before_canonize
- pattern_to_template_to_agent
- dataset_entries_need_lineage
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
