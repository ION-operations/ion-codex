schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: cross_domain_settlement_domain
title: Cross-Domain Settlement Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Settle outputs when multiple specialist domains participate in one task.
burden: Prevent specialist outputs from becoming output soup.
primary_questions:
- Which domains returned proposals?
- Do they conflict?
- What can be accepted, merged, deferred, or rejected?
specialist_agents:
- SETTLEMENT_STEWARD
- CONFLICT_NEMESIS
- MERGE_SCRIBE
- RECEIPT_CURATOR
state_families:
- branch_return_state
- conflict_state
- merge_proposal_state
- settlement_receipt_state
template_families:
- branch_return_packet
- conflict_review_packet
- settlement_packet
- merge_receipt
protocols:
- branch_returns_are_proposals
- settlement_before_inheritance
- receipt_after_fan_in
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
