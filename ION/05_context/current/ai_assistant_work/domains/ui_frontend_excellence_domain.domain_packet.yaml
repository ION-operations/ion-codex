settlement_route: ui_frontend_excellence_to_design_system_and_visual_proof_review
anti_drift_notes:
- Do not expose ION internals as user chores unless the user asks.
- Do not treat a chat textbox plus panels as a complete application.
- Do not accept a monolithic scrolling dashboard as a JOC/ION work surface.
- Do not skip loading, slow-response, empty, error, and permission states.
- Do not claim visual quality without screenshot/build proof or an explicit unrun note.
