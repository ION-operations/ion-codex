primary_questions:
- What operational work surface is this UI rendering?
- Which JOC/Opus/Echo/Victus canon surfaces apply?
- What must remain visible without becoming a monolith?
- What agent/tool/context/proof state does the user need to understand?
- What mission/session/driver/compute surfaces are active or relevant?
- What selected context, files, or memory should be visibly explained?
- What can remain internal unless the user asks for breakdown?
