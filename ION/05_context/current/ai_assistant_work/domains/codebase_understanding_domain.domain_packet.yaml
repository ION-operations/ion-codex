schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: codebase_understanding_domain
title: Codebase Understanding Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Map repository structure, dependencies, conventions, architecture, and change-local
  context before implementation.
burden: Prevent coding before the assistant understands project boundaries and local
  idioms.
primary_questions:
- Where is the relevant code?
- What conventions and dependencies govern it?
- What context package is sufficient for the next change?
specialist_agents:
- CODEBASE_CARTOGRAPHER
- DEPENDENCY_SCOUT
- ARCHITECTURE_READER
- CONVENTION_MINER
state_families:
- repo_map_state
- dependency_graph_state
- architecture_summary_state
- local_convention_state
template_families:
- codebase_scan_packet
- dependency_map_packet
- local_convention_packet
protocols:
- read_before_write
- locality_first_context
- architecture_boundary_check
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
