schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: knowledge_context_memory_domain
title: Knowledge, Context, and Memory Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Own retrieval, context packages, memory, source ranking, continuity bundles,
  and stale-context resistance.
burden: Prevent assistants from working from whatever context happens to be nearby.
primary_questions:
- What context is active for this action?
- Which sources outrank which?
- What should future work inherit?
specialist_agents:
- CONTEXT_CARTOGRAPHER
- SOURCE_RANKER
- MEMORY_STEWARD
- CONTINUITY_EXPORTER
state_families:
- context_package_state
- source_ranking_state
- memory_state
- continuity_bundle_state
template_families:
- context_package_packet
- source_ranking_packet
- continuity_bundle_packet
protocols:
- memory_orients_artifacts_govern
- context_is_bounded
- freshness_and_authority_ranking
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
