schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: chat_work_domain
title: Chat Work Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Model the chat assistant as a conversational work carrier with limited or
  indirect tool/state access.
burden: Separate helpful answer, candidate state, artifact creation, external action,
  and durable continuation.
primary_questions:
- Is the user asking for an answer, artifact, decision, plan, or mutation?
- What can this chat carrier actually do?
- What must be exported for continuation?
specialist_agents:
- CHAT_STEWARD
- CONVERSATION_CARTOGRAPHER
- ARTIFACT_HANDOFF_SCRIBE
state_families:
- conversation_intent_state
- artifact_state
- continuity_state
- pending_acceptance_state
template_families:
- chat_intake_packet
- artifact_creation_packet
- continuity_export_packet
protocols:
- answer_vs_state_boundary
- conversation_to_artifact_handoff
- portable_continuity_export
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
