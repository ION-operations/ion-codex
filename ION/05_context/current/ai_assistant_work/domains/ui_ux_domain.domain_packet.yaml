schema: ion.ai_assistant_work.domain_packet.v0_1
domain_id: ui_ux_domain
title: UI/UX Specialist Domain
state_class: candidate_current_state
status: seed_candidate
purpose: Own interface design, component systems, interaction patterns, accessibility,
  responsive behavior, and frontend polish.
burden: Prevent a generic coder from guessing UI without design-system, user-flow,
  accessibility, and visual-state context.
primary_questions:
- What user flow or screen state is being designed?
- What design system or component library governs it?
- What accessibility and responsive obligations apply?
specialist_agents:
- UI_ARCHITECT
- UX_FLOW_DESIGNER
- COMPONENT_BUILDER
- DESIGN_SYSTEM_STEWARD
- ACCESSIBILITY_AUDITOR
- FRONTEND_POLISHER
state_families:
- user_flow_state
- screen_state
- component_contract_state
- design_system_state
- accessibility_state
template_families:
- ui_brief_packet
- component_contract_packet
- interaction_state_matrix
- accessibility_review_packet
protocols:
- design_system_first
- states_before_pixels
- a11y_as_proof_gate
- responsive_behavior_matrix
route_ladders:
  level_0_identity:
    max_tokens: 150
  level_1_summary:
    max_tokens: 500
  level_2_working:
    max_tokens: 1500
  level_3_operational:
    max_tokens: 4000
  level_4_deep:
    max_tokens: 12000
  level_5_implementation:
    includes_paths: true
anti_drift_notes:
- Do not let a generic coding assistant absorb this domain without domain-specific
  context and proof obligations.
- Do not treat templates as enough; a domain needs specialist agents to maintain,
  route, validate, and settle the work.
- Do not promote this candidate into active canon without explicit acceptance and
  receipt.
update_rules:
  requires_steward: true
  requires_receipt: true
  candidate_only_until_accepted: true
