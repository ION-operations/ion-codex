    code, command, cwd, environment notes, and stdout/stderr summary.
  required_context:
  - command objective
  - command text
  - cwd
  - environment notes
  - stdout/stderr
  - return code
  required_sections:
  - COMMAND
  - CWD
  - OBJECTIVE
  - RETURN_CODE
  - STDOUT_SUMMARY
  - STDERR_SUMMARY
  - ARTIFACTS
  - CLAIMS_SUPPORTED
  - CLAIMS_NOT_SUPPORTED
  proof_gates:
  - return code recorded
  - unsupported validation claims rejected
  - artifacts referenced
  output_contract: command receipt and claim support map
  settlement_route: task owner or release evidence curator
  status: draft_template_packet_candidate
