schema: ion.ai_assistant_work.template_packet_drafts.v0_1
status: candidate_current_state_not_accepted_canon
created_at: '2026-05-08T15:00:56Z'
purpose: First concrete template packet drafts mined from assistant-work dataset genesis
  and domain-fission pressure.
authority_boundary:
  candidate_only: true
  mutates_ION_03_registry: false
  mutates_product_front_door: false
  requires_explicit_acceptance_to_land: true
template_packet_count: 31
template_packets:
- template_id: screen_state_matrix_packet
  title: Screen State Matrix Packet
  owned_by_domain: ui_state_modeling_domain
  primary_agent: UI_STATE_MODELER
  purpose: Convert a UI feature brief into explicit screen states, user roles, transitions,
    component obligations, and validation gates before implementation.
  required_context:
  - user story or product brief
  - existing routes/components if present
  - design system constraints
  - accessibility baseline
  required_sections:
  - INTENT
  - USER_ROLES
  - SCREEN_STATES
  - TRANSITIONS
  - COMPONENT_CONTRACTS
  - A11Y_GATES
  - TEST_GATES
  - NON_CLAIMS
  - SETTLEMENT_ROUTE
  proof_gates:
  - states include loading/error/empty/permission where applicable
  - component obligations are testable
  - a11y gates are named
  output_contract: screen-state matrix and downstream component/test packets
  settlement_route: UI_ARCHITECT or PRODUCT_ANALYST before COMPONENT_BUILDER
  status: draft_template_packet_candidate
- template_id: component_contract_to_tests_packet
  title: Component Contract to Tests Packet
  owned_by_domain: ui_state_modeling_domain
  primary_agent: COMPONENT_BUILDER
  purpose: Bind component props, states, interaction behavior, accessibility requirements,
    and validation tests before patching UI code.
  required_context:
  - screen-state matrix
  - component inventory
  - test framework surface
  - design-system tokens/components
  required_sections:
  - COMPONENT
  - PROPS_AND_EVENTS
  - STATE_VARIANTS
  - INTERACTION_RULES
  - A11Y_RULES
  - TEST_PLAN
  - PATCH_SCOPE
  - PROOF
  proof_gates:
  - each state variant has validation path
  - a11y checks are explicit
  - patch scope is bounded
  output_contract: bounded component implementation packet and test/a11y proof
  settlement_route: UI_STATE_MODELER then TEST_RUNNER/ACCESSIBILITY_AUDITOR
  status: draft_template_packet_candidate
- template_id: api_docs_example_validation_packet
  title: API Docs Example Validation Packet
  owned_by_domain: documentation_example_validation_domain
  primary_agent: EXAMPLE_RUNNER
  purpose: Ensure API documentation examples are either run with proof or clearly
    marked as illustrative/unrun.
  required_context:
  - API surface
  - example snippets
  - runtime/test command availability
  - version boundary
  required_sections:
  - API_SURFACE
  - EXAMPLES
  - RUN_STATUS
  - COMMAND_RECEIPTS
  - CLAIM_MAP
  - UNRUN_MARKERS
  - DOCS_DELTA
  - NON_CLAIMS
  proof_gates:
  - every executable example is run or marked unrun
  - command receipts include return codes
  - claims map to source/API
  output_contract: docs patch candidate with example validation receipt
  settlement_route: DOCS_ARCHITECT and SOURCE_RANKER
  status: draft_template_packet_candidate
- template_id: rewrite_claim_preservation_packet
  title: Rewrite Claim Preservation Packet
  owned_by_domain: documentation_example_validation_domain
  primary_agent: REWRITE_CLAIM_AUDITOR
  purpose: Separate style improvement from claim changes, preserving authority and
    source alignment during rewrites.
  required_context:
  - original text
  - rewrite goal
  - claim-bearing passages
  - source evidence or lack thereof
  required_sections:
  - REWRITE_GOAL
  - CLAIM_INVENTORY
  - MEANING_DELTA
  - SOURCE_MAP
  - STYLE_ONLY_CHANGES
  - CLAIM_CHANGES
  - NON_CLAIMS
  proof_gates:
  - claim additions are flagged
  - unsupported claims remain marked
  - style changes do not alter authority
  output_contract: rewrite candidate with claim-preservation audit
  settlement_route: DOCS_ARCHITECT or SOURCE_RANKER
  status: draft_template_packet_candidate
- template_id: branch_return_settlement_packet
  title: Branch Return Settlement Packet
  owned_by_domain: background_queue_intake_domain
  primary_agent: RESULT_INTAKE_AUDITOR
  purpose: Intake cloud/background/parallel branch returns as proposals and route
    them through conflict/proof settlement.
  required_context:
  - parent scope
  - branch packet
  - branch return
  - files/state touched
  - proof supplied
  required_sections:
  - PARENT_SCOPE
  - BRANCH_ID
  - RETURN_SUMMARY
  - TOUCHED_SURFACES
  - PROOF
  - CONFLICTS
  - ACCEPTANCE_BOUNDARY
  - SETTLEMENT_RECOMMENDATION
  proof_gates:
  - branch identity preserved
  - returns treated as proposal
  - conflicts and missing proof named
  output_contract: settlement recommendation and receipt draft
  settlement_route: SETTLEMENT_STEWARD with human gate when high risk
  status: draft_template_packet_candidate
- template_id: background_queue_result_intake_packet
  title: Background Queue Result Intake Packet
  owned_by_domain: background_queue_intake_domain
  primary_agent: BACKGROUND_QUEUE_STEWARD
  purpose: Create bounded queue packets and intake background results without claiming
    asynchronous execution unless receipts prove it.
  required_context:
  - operator objective
  - authority ceiling
  - allowed paths/tools
  - expected return family
  - approval evidence if required
  required_sections:
  - QUEUE_OBJECTIVE
  - AUTHORITY
  - ALLOWED_ACTIONS
  - EXPECTED_RETURN
  - APPROVAL
  - RESULT_INTAKE
  - PROOF
  - NON_CLAIMS
  proof_gates:
  - approval evidence checked when required
  - result has receipt or remains untrusted proposal
  - no background claim without return proof
  output_contract: queue packet or result-intake report
  settlement_route: RESULT_INTAKE_AUDITOR then SETTLEMENT_STEWARD
  status: draft_template_packet_candidate
