  - aiw_obs_0026_cli_batch_patch
  - aiw_obs_0033_tool_automation_script
  settlement_route: proof_receipt_to_task_or_release_owner
  status: fission_candidate_not_accepted_domain
- domain_id: ui_state_modeling_domain
  title: UI State Modeling Domain
  purpose: UI tasks recur as screen states, user flows, components, accessibility,
    and interaction validation. Screen-state modeling should precede component implementation.
  parent_domains:
  - ui_ux_domain
  - product_requirements_domain
  - testing_quality_domain
  primary_specialist_agents:
  - UI_STATE_MODELER
  - SCREEN_STATE_CARTOGRAPHER
  - UI_ARCHITECT
  - COMPONENT_BUILDER
  - ACCESSIBILITY_AUDITOR
  template_packet_count: 3
  state_family_count: 5
  evidence_entry_ids:
