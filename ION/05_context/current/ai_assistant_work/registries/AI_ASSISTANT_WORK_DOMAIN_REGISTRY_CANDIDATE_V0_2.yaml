  primary_specialist_agents:
  - WORK_PATTERN_ETHNOGRAPHER
  - STATE_TAXONOMIST
  - TEMPLATE_MINER
  - FAILURE_CLASSIFIER
  state_family_count: 5
  template_family_count: 4
  status: seed_candidate
- domain_id: cross_domain_settlement_domain
  title: Cross-Domain Settlement Domain
  purpose: Settle outputs when multiple specialist domains participate in one task.
  primary_specialist_agents:
  - SETTLEMENT_STEWARD
  - CONFLICT_NEMESIS
  - MERGE_SCRIBE
  - RECEIPT_CURATOR
  state_family_count: 4
  template_family_count: 4
  status: seed_candidate
- domain_id: pr_agent_work_domain
  title: PR Agent Work Domain
  purpose: PR-agent work combines diff review, CI evidence, lockfile analysis, review
    comments, and merge settlement. Dataset entries show it repeatedly crosses generic
    review/security, dependency, and settlement domains.
  parent_domains:
  - review_security_domain
  - cross_domain_settlement_domain
  - dependency_package_domain
  - testing_quality_domain
  primary_specialist_agents:
  - PR_REVIEW_STEWARD
  - PR_COMMENT_SCRIBE
  - PR_MERGE_SETTLEMENT_AUDITOR
  - CI_EVIDENCE_TRIAGER
  - LOCKFILE_AUDITOR
  template_packet_count: 5
  state_family_count: 5
  evidence_entry_ids:
  - aiw_obs_0019_lockfile_diff_review
  - aiw_obs_0022_pr_code_review
  - aiw_obs_0023_pr_merge_settlement
  - aiw_obs_0027_ci_failure_triage
  settlement_route: review_return_to_settlement_steward
  status: fission_candidate_not_accepted_domain
- domain_id: background_queue_intake_domain
  title: Background Queue and Result Intake Domain
  purpose: Background agent work is neither ordinary chat nor ordinary implementation.
    It needs queue packets, authority gates, asynchronous-result intake, proof normalization,
    and receipt boundaries.
  parent_domains:
  - workflow_automation_tool_domain
  - cross_domain_settlement_domain
  - knowledge_context_memory_domain
  primary_specialist_agents:
  - BACKGROUND_QUEUE_STEWARD
  - CLOUD_BRANCH_STEWARD
  - RESULT_INTAKE_AUDITOR
  - SETTLEMENT_STEWARD
  template_packet_count: 3
  state_family_count: 5
  evidence_entry_ids:
  - aiw_obs_0024_cloud_background_feature
  - aiw_obs_0025_cloud_parallel_work
  - aiw_obs_0035_background_daemon_queue
  settlement_route: background_return_intake_then_parent_settlement
  status: fission_candidate_not_accepted_domain
- domain_id: terminal_proof_domain
  title: Terminal and Command Proof Domain
  purpose: IDE/CLI work depends on command evidence, return codes, stdout/stderr excerpts,
    reruns, and non-claims. This proof is a reusable domain burden, not just a testing
    detail.
  parent_domains:
  - workflow_automation_tool_domain
  - testing_quality_domain
  - implementation_domain
  primary_specialist_agents:
  - TERMINAL_PROOF_CURATOR
  - COMMAND_RECEIPT_AUDITOR
  - TEST_RUNNER
  - PATCH_MASON
  template_packet_count: 3
  state_family_count: 4
  evidence_entry_ids:
