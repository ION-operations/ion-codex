    were run.
  parent_domains:
  - documentation_writing_domain
  - testing_quality_domain
  - codebase_understanding_domain
  primary_specialist_agents:
  - DOCS_ARCHITECT
  - TECHNICAL_WRITER
  - EXAMPLE_RUNNER
  - REWRITE_CLAIM_AUDITOR
  - DOCS_NEMESIS
  template_packet_count: 3
  state_family_count: 4
  evidence_entry_ids:
