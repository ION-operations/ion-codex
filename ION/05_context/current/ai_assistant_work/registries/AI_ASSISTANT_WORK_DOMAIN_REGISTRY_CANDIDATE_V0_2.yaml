  - aiw_obs_0010_docs_readme_refresh
  - aiw_obs_0011_api_docs_generation
  - aiw_obs_0012_changelog_release_notes
  settlement_route: docs_claims_to_source_ranker_or_release_owner
  status: fission_candidate_not_accepted_domain
- domain_id: release_evidence_domain
  title: Release Evidence Domain
  purpose: Release readiness requires collecting evidence across tests, builds, docs,
    risk gates, approvals, and known non-claims. Local success should not become release
    readiness.
  parent_domains:
  - devops_release_domain
  - testing_quality_domain
  - cross_domain_settlement_domain
  primary_specialist_agents:
  - RELEASE_EVIDENCE_CURATOR
  - RELEASE_MANAGER
  - BUILD_STEWARD
  - REGRESSION_HUNTER
  - RELEASE_GATE_NEMESIS
  template_packet_count: 3
  state_family_count: 5
  evidence_entry_ids:
  - aiw_obs_0012_changelog_release_notes
  - aiw_obs_0015_regression_matrix_update
  - aiw_obs_0028_release_readiness
  - aiw_obs_0030_schema_migration
  settlement_route: release_evidence_to_human_or_steward_decision
  status: fission_candidate_not_accepted_domain
- domain_id: migration_work_domain
  title: Schema and Data Migration Work Domain
  purpose: Migration work has special rollback, fixture, data-shape, deployment, and
