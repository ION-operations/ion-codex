schema: ion.ai_assistant_work.template_spec.v0_1
template_id: terminal_proof_receipt_packet
title: Terminal Proof Receipt Packet
status: candidate_machine_checkable_template_spec_not_accepted_canon
created_at: '2026-05-08T15:19:39Z'
authority_boundary:
  candidate_only: true
  allowed_path: ION/05_context/current/ai_assistant_work/
  mutates_ION_03_registry: false
  mutates_product_front_door: false
  external_execution_authority: false
  requires_explicit_acceptance_to_land: true
owned_by_domain: terminal_proof_domain
primary_agent: TERMINAL_PROOF_CURATOR
supporting_agents:
- COMMAND_RECEIPT_AUDITOR
- TEST_RUNNER
- RECEIPT_CURATOR
purpose: Normalize command execution evidence into receipt-ready proof with return
  code, command, cwd, environment notes, and stdout/stderr summary.
intent_class: specialist_domain_template
state_inputs:
- command_state
- workspace_state
- test_target_state
state_outputs:
- command_receipt_state
- proof_claim_state
- rerun_instruction_state
required_context:
- command objective
- command text
- cwd
- environment notes
- stdout/stderr
- return code
machine_required_sections:
- name: COMMAND_INTENT
  type: string
  min_length: 10
- name: COMMAND
  type: string
  min_length: 2
- name: WORKING_DIRECTORY
  type: string
  min_length: 1
- name: ENVIRONMENT_NOTES
  type: list
  min_items: 0
- name: RETURN_CODE
  type: integer
- name: STDOUT_EXCERPT
  type: string
  min_length: 0
- name: STDERR_EXCERPT
  type: string
  min_length: 0
- name: INTERPRETATION
  type: string
  min_length: 20
- name: NON_CLAIMS
  type: list
  min_items: 1
- name: RECEIPT_TARGET
  type: string
  min_length: 5
proof_gates:
- gate_id: candidate_boundary_named
  description: Output states it is candidate/not accepted unless explicit acceptance
    exists
  machine_check:
    requires_non_claim: accepted_state
- gate_id: required_sections_present
  description: Every machine_required_sections item is present and non-empty according
    to rule
  machine_check:
    type: schema_section_presence
- gate_id: settlement_route_named
  description: Return includes route for review/settlement/inheritance
  machine_check:
    section_any:
    - SETTLEMENT_ROUTE
    - RECEIPT_TARGET
- gate_id: proof_or_missing_context_named
  description: Proof, command receipts, or missing context are stated
  machine_check:
    requires_any:
    - PROOF
    - COMMAND_RECEIPTS
    - TEST_AND_PROOF_PLAN
    - PROOF_NORMALIZATION
    - CI_EVIDENCE
- gate_id: draft_gate_1
  description: return code recorded
  machine_check:
    type: human_or_script_check
- gate_id: draft_gate_2
  description: unsupported validation claims rejected
  machine_check:
    type: human_or_script_check
- gate_id: draft_gate_3
  description: artifacts referenced
  machine_check:
    type: human_or_script_check
reject_if:
- return code is absent
- interpretation claims success despite nonzero return code without explanation
- stdout/stderr excerpts are unbounded or fabricated
output_contract: command receipt and claim support map
completion_class: proof_receipt_candidate
settlement_route: task owner or release evidence curator
route_binding:
  dispatch_before_generic_implementation: true
  trigger_patterns:
  - terminal proof receipt packet
  - terminal proof receipt
  - terminal proof curator
  fallback_agent_forbidden_until_specialist_check: true
minimal_valid_instance_shape:
  template_id: terminal_proof_receipt_packet
  sections: must match machine_required_sections
  non_claims_required: true
  settlement_route_or_receipt_target_required: true
status_notes:
- This spec is machine-checkable structure for candidate current-context use; it is
  not active template law.
