schema_id: ion.live_persona_latency_policy.v1
authority: A3_DOCTRINE_AND_RUNTIME_PLANNING
production_authority: false
lanes:
  L0: backchannel
  L1: conversational_provisional
  L2: checked_response
  L3: ratified_answer
  L4: formal_artifact
never_provisional:
  - production_authority
  - destructive_action
  - security_sensitive_action
  - high_stakes_advice
  - credential_use
  - identity_personhood_claim
  - file_or_test_proof_claim
required_repair_actions:
  - interrupt
  - retract_or_narrow
  - cite_updated_state
  - receipt_correction
