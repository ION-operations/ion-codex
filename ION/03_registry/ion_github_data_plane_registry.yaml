next_implementation_slices:
  - id: github_audit_read_only
    status: implemented_read_only
    output: kernel.ion_github_data_plane_audit
    source_prior_art: codexgit_status_report.py
    requires_network: false
    mutates_git_or_github: false
    module_path: ION/04_packages/kernel/ion_github_data_plane_audit.py
    test_path: ION/tests/test_kernel_ion_github_data_plane_audit.py
  - id: commit_proposal_receipt
    status: implemented_non_authorizing_review_receipt
    output: kernel.ion_github_commit_proposal_receipt
    requires_secret_scan: true
    mutates_git_or_github: false
    authorization_model: ion_runtime_policy_not_per_push_human_gate
    module_path: ION/04_packages/kernel/ion_github_commit_proposal_receipt.py
    test_path: ION/tests/test_kernel_ion_github_commit_proposal_receipt.py
    receipt_output_dir: ION/05_context/current/github_data_plane/commit_proposals/
  - id: github_issue_dry_run_import
    status: planned_after_commit_receipts
    output: proposed ION work packets from issue metadata
    requires_network: true
    mutates_git_or_github: false
  - id: runtime_commit_push_authority
    status: planned_after_commit_receipts
    output: ION runtime git commit/push authority profile and daemon execution slice
    requires_secret_scan: true
    mutates_git_or_github: true
    authorization_model: ion_policy_gated_runtime_capability
    default_allowed_push_branch_patterns:
      - work/*
      - docs/*
      - agent/*
      - data-plane/*
    main_auto_push_allowed: false
    main_update_path: pull_request_or_merge_gate
human_setup_commands:
  - cd "/home/sev/ION - Production/ION_CODEX"
  - test -f pyproject.toml && test -f ION/REPO_AUTHORITY.md
  - git init
  - git branch -M main
  - gh auth login --hostname github.com --git-protocol https --scopes repo
  - gh repo create ION-operations/ion-codex --public --description "ION Codex carrier workspace and data plane" --disable-wiki
  - git remote add origin https://github.com/ION-operations/ion-codex.git
  - git remote -v
guardrails:
  - no_secret_or_token_storage
  - no_default_carrier_git_push_without_ion_runtime_push_authority
  - no_production_deployment
  - no_direct_merge_or_issue_close_by_daemon
  - no_duplicate_ion_queue
  - raw_codex_output_requires_existing_task_return_proof_gates
  - no_secret_scanning_bypass_as_normal_workflow
  - no_non_volitional_autonomous_commits_first_slice
  - git_push_is_runtime_data_plane_capability_after_policy_profile
receipt_requirements:
  - action_id
  - actor_or_carrier_id
  - issue_branch_pr_commit_refs
  - artifact_sha256_or_url
  - ion_packet_path
  - ion_receipt_path
  - validations_run
  - failure_classification
