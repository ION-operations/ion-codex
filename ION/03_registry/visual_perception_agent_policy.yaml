schema_id: ion.visual_perception_agent_policy.v1
authority: A3_DOCTRINE_AND_RUNTIME_PLANNING
production_authority: false
modes:
  - OBSERVE
  - DIAGNOSE
  - COMPARE
  - NAVIGATE
  - TEST
  - EXPLAIN
  - PATCH_REQUEST
  - VERIFY
allowed_initial_scope:
  - screenshot_analysis
  - dom_read_inspection
