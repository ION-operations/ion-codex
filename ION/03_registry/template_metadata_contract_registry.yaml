registry_id: template_metadata_contract_registry
status: current_phase_seed
created: '2026-04-24'
contract_status_enum:
- NO_CONTRACT
- DRAFT_CONTRACT
- PROVISIONAL_CONTRACT
- ACTIVE_CONTRACT
- RETIRED_CONTRACT
- QUARANTINED_CONTRACT
required_contract_fields:
- template_id
- canonical_name
- version
- contract_status
- file_class
- graph_node_type
- graph_region
- authority_class
- lifecycle
- required_fields
- completion_threshold
- downstream_effects
- reaction_hooks
- review
- receipts
- safety
contracts:
- template_id: events.template_completion_event
  canonical_name: Template Completion Event
  version: '1.0'
  contract_status: ACTIVE_CONTRACT
  file_class: template_completion_event_witness
  graph_node_type: node.template_completion_event
  graph_region: region.evented_file_graph
  authority_class: RUNTIME_PROOF_SURFACE
  lifecycle:
    allowed_statuses:
    - WITNESS
    - REFUSED
    - HELD
    draft_statuses: []
    complete_statuses:
    - WITNESS
    terminal_statuses:
    - WITNESS
    - REFUSED
    - HELD
  required_fields:
  - event_id
  - source_file
  - template_id
  - graph_region
  - authority_class
  - completion_state
  optional_fields:
  - warnings
  - notes
  completion_threshold:
    mode: all_required_fields
    required_fields:
    - event_id
    - source_file
    - template_id
    - graph_region
    - authority_class
    - completion_state
    additional_checks:
    - contract_status_allows_eventing
  graph_mapping:
    node_id_strategy: field
    node_id_field: event_id
    edge_fields:
    - source_file
    dependency_fields: []
    affected_region_fields:
    - graph_region
  downstream_effects:
    allowed:
    - reaction_selection_witness
    forbidden:
    - graph_commit
    - registry_mutation
    - agent_activation
  reaction_hooks:
    index_update_hooks: []
    scheduler_hooks: []
    agent_activation_hooks: []
    registry_update_hooks: []
    graph_writeback_hooks: []
  review:
    required_reviewers:
    - Steward
    review_depth: D2
    approval_required: false
  receipts:
    receipt_required: true
    receipt_classes:
    - template_completion_scan_receipt
  safety:
    forbidden_reactions:
    - direct_graph_mutation
    - direct_registry_update
    escalation_behavior: HOLD_OR_ESCALATE
    stale_behavior: REFUSE_STALE_EVENT
    contradiction_behavior: ESCALATE_CONTRADICTION
