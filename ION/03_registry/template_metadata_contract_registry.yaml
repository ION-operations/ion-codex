- template_id: doctrine.evolution_packet
  canonical_name: Doctrine Evolution Packet
  version: '1.0'
  contract_status: PROVISIONAL_CONTRACT
  file_class: doctrine_evolution_packet
  graph_node_type: node.file.template_instantiated
  graph_region: region.doctrine_evolution
  authority_class: A3_OPERATIONAL_PROPOSAL
  lifecycle:
    allowed_statuses:
    - DRAFT
    - COMPLETE_PROPOSAL
    - HELD
    - LANDED_PROVISIONAL
    draft_statuses:
    - DRAFT
    complete_statuses:
    - COMPLETE_PROPOSAL
    terminal_statuses:
    - LANDED_PROVISIONAL
    - HELD
  required_fields:
  - packet_id
  - statement
  - depth_class
  - authority_posture
  - donor_line_search
  - contradiction_review
  - reexpression_validation
  - runtime_mapping
  - required_reviewers
  completion_threshold:
    mode: all_required_fields
    required_fields:
    - packet_id
    - statement
    - depth_class
    - authority_posture
    - donor_line_search
    - contradiction_review
    - reexpression_validation
    - runtime_mapping
    - required_reviewers
    additional_checks:
    - depth_reviewers_match_protocol
  optional_fields:
  - affected_graph_regions
  - affected_laws
  graph_mapping:
    node_id_strategy: field
    node_id_field: packet_id
    edge_fields:
    - affected_laws
    - affected_protocols
    dependency_fields:
    - donor_line_search
    affected_region_fields:
    - affected_graph_regions
  downstream_effects:
    allowed:
    - semantic_review
    - contradiction_review
    - registry_update_proposal
    - approved_context_index_update
    forbidden:
    - silent_ratification
    - direct_constitutional_write
  reaction_hooks:
    index_update_hooks:
    - approved_context_index_update
    scheduler_hooks:
    - required_review_scheduling
    agent_activation_hooks:
    - Nemesis
    - Vestige
    registry_update_hooks:
    - proposal_only
    graph_writeback_hooks:
    - proposal_only
  review:
    required_reviewers:
    - Steward
    - Nemesis
    review_depth: D3_TO_D5
    approval_required: true
  receipts:
    receipt_required: true
    receipt_classes:
    - doctrine_evolution_receipt
  safety:
    forbidden_reactions:
    - silent_ratification
    - direct_constitutional_write
    escalation_behavior: ESCALATE_IF_D4_D5_UNREVIEWED
    stale_behavior: HOLD_FOR_RECONFIRMATION
    contradiction_behavior: ESCALATE_CONTRADICTION

